services:
  - type: web
    name: rc-aircraft-design-studio
    runtime: python
    plan: free
    buildCommand: pip install --no-cache-dir . && pip install --no-cache-dir -r webui/requirements.txt
    startCommand: cd webui && gunicorn app:server --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
